#
# Secret scanning. Runs gitleaks against every push and pull request.
# Tier 0 deliverable per docs/PLAN.md §10.
#
# This workflow MUST stay enabled. Disabling it requires a public
# write-up in docs/SECURITY.md explaining why.

name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege token. gitleaks only needs to read the repo; it does
# not write to issues, PRs, or releases. Sarif upload requires the
# `security-events: write` scope on GHES with code scanning enabled,
# but is gated behind a step-level conditional so the basic scan works
# everywhere.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so gitleaks can scan all commits in
          # the PR range, not just the surface tree.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Pinning a known-good action version + redacting findings in
          # logs is the default behavior of gitleaks-action@v2.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for organizational use of
          # gitleaks-action; this project is public OSS so the license
          # check is skipped and the action runs in basic mode.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
